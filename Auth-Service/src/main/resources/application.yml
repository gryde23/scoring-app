server:
  port: 8080

spring:
  application:
    name: Auth-Service

  datasource:
    url: jdbc:postgresql://localhost:5434/auth_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: true

  security:
    jwt:
      secret: ${JWT_SECRET}
      issuer: "auth-service"
      access-token-expiration-minutes: 60
